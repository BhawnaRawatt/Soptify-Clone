<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify-Sending good vibes through the power of music</title>
    <link rel="stylesheet" href="style.css" class="rel">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
       </head>

<body>
    <nav>
        <ul>
            <li class="brand"><img src="logo.png" alt="Logo">Spotify</li>
            <li>Home</li>
            <li>About</li>
        </ul>
    </nav>

    <div class="container">
        <div class="songList">
            <h1>Best of NCS - No Copyright Song</h1>
            <div class="songItemContainer">
            <div class="songItem">
                <img  alt="1" />
                <span class="songName">Haan ki Haan</span>
                <span class="songListPlay">
                    <span class="timeStamp">3:11<i id="1" class="fa-1x songItemPlay fa-regular fa-circle-play"></i></span>

                </span>

            </div>
            <div class="songItem">
                <img  alt="2" />
                <span class="songName">Lover</span>
                <span class="songListPlay">
                    <span class="timeStamp">3:11<i id="2" class="fa-1x songItemPlay fa-regular fa-circle-play"></i></span>

                </span>

            </div>
            <div class="songItem">
                <img  alt="3" />
                <span class="songName">Janiye</span>
                <span class="songListPlay">
                    <span class="timeStamp">3:11<i id="3" class="fa-1x songItemPlay fa-regular fa-circle-play"></i></span>

                </span>

            </div>
            <div class="songItem">
                <img  alt="4" />
                <span class="songName">Bekhayali</span>
                <span class="songListPlay">
                    <span class="timeStamp">3:11<i id="4" class="fa-1x songItemPlay fa-regular fa-circle-play"></i></span>

                </span>

            </div>
            <div class="songItem">
                <img  alt="5" />
                <span class="songName">Dheere Dheere</span>
                <span class="songListPlay">
                    <span class="timeStamp">3:11<i id="5" class="fa-1x songItemPlay fa-regular fa-circle-play"></i></span>

                </span>

            </div>
            <div class="songItem">
                <img  alt="6" />
                <span class="songName">Fakira By Sanam</span>
                <span class="songListPlay">
                    <span class="timeStamp">3:11<i id="6" class="fa-1x songItemPlay fa-regular fa-circle-play"></i></span>

                </span>

            </div>
            <div class="songItem">
                <img  alt="7" />
                <span class="songName">O Mere Sona re</span>
                <span class="songListPlay">
                    <span class="timeStamp">3:11<i id="7" class="fa-1x songItemPlay fa-regular fa-circle-play"></i></span>

                </span>

            </div>
            <div class="songItem">
                   
                <img  alt="8" />
                <span class="songName">Baby Baby</span>
                <span class="songListPlay">
                    <span class="timeStamp">3:11<i id="8" class="fa-1x songItemPlay fa-regular fa-circle-play"></i></span>

                </span>

            </div>
            <div class="songItem">
                <img  alt="9" />
                <span class="songName">abcd</span>
                <span class="songListPlay">
                    <span class="timeStamp">3:11<i id="9" class="fa-1x songItemPlay fa-regular fa-circle-play"></i></span>

                </span>

            </div>
        </div>

        </div>

        <div class="songBanner"></div>
    </div>

    <div class="bottom">
        <input type="range" name="range" id="Progressbar" min="0" max="100" value="0">
        <div class="icons">
            <i class="fa-3x fa-solid  fa-backward" id="previous"></i>
            <i class="fa-3x fa-regular fa-circle-play" id="masterPlay"></i>
            <i class="fa-3x fa-solid fa-forward" id="next"></i>
        </div>
        <div class="songInfo">
            <img src="./playing2.gif" width="42px" id="gif"> <span id="masterSongName"></span> 
           </div>
    </div>
       <script src="script.js"></script>
</body>

</html>
